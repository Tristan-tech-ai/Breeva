# VAYU — Supabase Keep-Alive Ping
# Prevents Supabase free-tier project from auto-pausing (7 days inactivity)
# Runs every 6 days — well within the window
name: VAYU Supabase Ping

on:
  schedule:
    - cron: '0 6 */6 * *'   # Every 6 days at 06:00 UTC
  workflow_dispatch: {}       # Manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "Pinging Supabase at $(date -u)"
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            "${SUPABASE_URL}/rest/v1/aqi_grid?select=tile_id&limit=1" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}")
          echo "Response status: ${STATUS}"
          if [ "$STATUS" -ne 200 ]; then
            echo "::warning::Supabase ping returned ${STATUS}"
            exit 1
          fi
          echo "Supabase is alive ✅"
